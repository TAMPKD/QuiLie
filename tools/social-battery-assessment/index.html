<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />

  <title>Social Battery Leak Assessment — QuiLie</title>
  <meta name="description" content="A free 2-minute self-reflection tool. Discover how much energy you spend masking at work — and where it's actually leaking." />
  <meta name="robots" content="index, follow" />
  <link rel="canonical" href="https://www.quilie.life/tools/social-battery-assessment/" />

  <!-- Open Graph — controls how the link looks when posted on Reddit, X, WhatsApp -->
  <meta property="og:type" content="website" />
  <meta property="og:url" content="https://www.quilie.life/tools/social-battery-assessment/" />
  <meta property="og:title" content="How much energy are you spending pretending at work?" />
  <meta property="og:description" content="Free quiz. 9 questions. No email. Find out exactly where your social battery is leaking." />
  <meta property="og:image" content="https://www.quilie.life/assets/og-assessment.png" />
  <meta name="twitter:card" content="summary_large_image" />
  <meta name="twitter:image" content="https://www.quilie.life/assets/og-assessment.png" />

  <!-- Fonts — identical to index.html, including Geist as Sora fallback -->
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Geist:wght@300;400;500;600;700&family=Instrument+Serif:ital@0;1&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet" />

  <!--
    Shared stylesheet — two levels up from tools/social-battery-assessment/
    url() inside CSS resolves relative to styles.css itself (site root),
    so the Sora @font-face paths in styles.css work unmodified.
  -->
  <link rel="stylesheet" href="../../styles.css" />

  <!-- React 18 + Babel — exact same versions and integrity hashes as index.html -->
  <script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>

  <script defer src="/_vercel/insights/script.js"></script>

  <style>
    /* Page-level only — no tokens invented here, everything else in styles.css */
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body { background: var(--bg); }
    #root { opacity: 0; animation: rootIn .4s ease .1s forwards; }
    @keyframes rootIn { to { opacity: 1; } }
    .assess-brand .brand-mark { width: 26px; height: 26px; border-radius: 7px; overflow: hidden; display: grid; place-items: center; }
    .assess-brand .brand-mark img { width: 100%; height: 100%; object-fit: cover; }
  </style>
</head>
<body>
  <div id="root"></div>
  <script type="text/babel" src="assessment.jsx"></script>
</body>
</html>
